[build]
  command = "npm run build"
  publish = "dist"

# Ensure SPA routing works on Netlify
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = true

# Cache static assets forever on Netlify CDN
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

